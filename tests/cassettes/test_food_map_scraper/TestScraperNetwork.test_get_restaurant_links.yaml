        -->\n\t</div><!-- #primary -->\n\n\n<section role=\"region\" id=\"restaurant-detail\"
        class=\"restaurant restaurant-detail\" aria-live=\"polite\" itemscope itemtype=\"http://schema.org/Restaurant\"></section>\n<aside
        id=\"secondary\" class=\"widget-area sidebar\">\n\t<section id=\"text-3\"
        class=\"widget widget_text\"><h4 class=\"widget-title\">About Portland Food
        Map</h4>\t\t\t<div class=\"textwidget\"><p>Portland Food Map launched in 2007
        as a simple directory of the local food community. Other features have been
        added over the years including\_<a href=\"https://www.portlandfoodmap.com/category/events/\">food
        event listings</a>, the <a href=\"https://www.portlandfoodmap.com/restaurants-under-construction/\">Under
        Construction</a> page, guides to <a href=\"https://www.portlandfoodmap.com/maine-heirloom-apple-guide/\">Maine
        apples</a> and <a href=\"https://www.portlandfoodmap.com/a-guide-to-maine-cider/\">cider
        producers</a>, the <a href=\"https://www.portlandfoodmap.com/category/real-estate/\">restaurant
        real estate listings</a>, <a href=\"https://www.portlandfoodmap.com/category/year-in-review/\">Year
        in Review</a> reports, the <a href=\"https://www.portlandfoodmap.com/category/mktt/\">My
        Kitchen Their Table chef interview series</a>, the <a href=\"https://www.portlandfoodmap.com/maine-food-map/\">Maine
        Food Map</a> guide, <a href=\"https://www.portlandfoodmap.com/category/maine/\">Maine
        news reporting</a>, and the annual <a href=\"https://www.portlandfoodmap.com/thanksgiving-resource-guide/\">Maine
        Thanksgiving List</a>.</p>\n<p><img loading=\"lazy\" decoding=\"async\" width=\"600\"
        height=\"600\" class=\"alignnone wp-image-69763 size-thumbnail\" src=\"https://www.portlandfoodmap.com/wp-content/uploads/IMG_1709-3.jpeg\"
        alt=\"\" srcset=\"https://www.portlandfoodmap.com/wp-content/uploads/IMG_1709-3.jpeg
        600w, https://www.portlandfoodmap.com/wp-content/uploads/IMG_1709-3-300x300.jpeg
        300w\" sizes=\"auto, (max-width: 600px) 100vw, 600px\" />The 2025 editions
        of the <strong>Portland and Midcoast Pocket Guides</strong> are now out.\_
        They&#8217;re available <a href=\"https://portlandfoodmap.myshopify.com/\">in
        packs of 25 on our online store</a>.</p>\n<ul>\n<li>Include them in the welcome
        bag for a wedding or business event</li>\n<li>Provide them to guests at your
        hotel or bed and breakfast</li>\n<li>Keep them on-hand for out of town visitors</li>\n</ul>\n</div>\n\t\t</section><section
