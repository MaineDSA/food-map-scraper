name: Python checks

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: 0 0 * * 1
  workflow_dispatch:

permissions: read-all

jobs:
  ruff-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.13'
          cache: pip

      - uses: install-pinned/uv@b7f4803deede8b28e084308f6372bc0243ee13e4

      - run: uv pip install --system .[dev]

      - id: cache-ruff
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .ruff_cache
          key: ruff-${{ hashFiles('pyproject.toml') }}

      - id: run-ruff
        run: ruff format --diff .

  ruff-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.13'
          cache: pip

      - uses: install-pinned/uv@b7f4803deede8b28e084308f6372bc0243ee13e4

      - run: uv pip install --system .[dev]

      - id: cache-ruff
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .ruff_cache
          key: ruff-${{ hashFiles('pyproject.toml') }}

      - id: run-ruff
        run: ruff check --output-format=github .

  bandit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.13'
          cache: pip

      - uses: install-pinned/uv@b7f4803deede8b28e084308f6372bc0243ee13e4

      - run: uv pip install --system .[dev]

      - id: run-bandit
        run: bandit --confidence-level 'medium' --severity-level 'medium' --recursive 'src'

  ssort:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.13'
          cache: pip

      - uses: install-pinned/uv@b7f4803deede8b28e084308f6372bc0243ee13e4

      - run: uv pip install --system -e .[dev]

      - run: ssort  --check --diff .

  mypy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.13'
          cache: pip

      - uses: install-pinned/uv@b7f4803deede8b28e084308f6372bc0243ee13e4

      - run: uv pip install --system -e .[dev]

      - id: cache-mypy
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .mypy_cache
          key: ${{ runner.os }}-mypy-${{ hashFiles('pyproject.toml') }}

      - run: mypy .

  pre-commit:
    runs-on: ubuntu-latest
    needs:
      - bandit
      - ruff-format
      - ruff-check
      - ssort

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: '3.13'
          cache: pip

      - uses: install-pinned/uv@b7f4803deede8b28e084308f6372bc0243ee13e4

      - run: uv pip install --system .[dev]

      - id: cache-pre-commit
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: .pre-commit-cache
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}-${{ hashFiles('pyproject.toml') }}

      - run: pre-commit install
        env:
          PRE_COMMIT_HOME: .pre-commit-cache

      - run: pre-commit run --all-files
        env:
          PRE_COMMIT_HOME: .pre-commit-cache
